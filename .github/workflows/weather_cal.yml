name: Generate Weather Calendar

on:
  schedule:
    - cron: '0 14 * * *' # 日本時間の23時（UTC 14時）に毎日実行
  workflow_dispatch: # 手動でいつでも実行できるボタンを出す

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests ics

      - name: Run calendar generation
        run: python generate_cal.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add calendars/
          git commit -m "Update weather calendar" || exit 0
          git push
